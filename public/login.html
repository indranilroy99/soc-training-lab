<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIAAS-SEC — Login</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #1a1d2e;
    --card:      #212433;
    --input-bg:  #2a2d3e;
    --border:    #3a3d4e;
    --green:     #2bcc8b;
    --green-dim: rgba(43,204,139,0.12);
    --red:       #ff4757;
    --text:      #ffffff;
    --muted:     #9da5b4;
    --font:      system-ui, -apple-system, 'Segoe UI', sans-serif;
  }

  html, body {
    height: 100%;
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(43,204,139,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(43,204,139,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* subtle glow orb */
  body::after {
    content: '';
    position: fixed;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(43,204,139,0.06) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 0;
  }

  .login-wrap {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    padding: 20px;
  }

  .login-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 40px 36px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.4);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
    justify-content: center;
  }

  .logo-icon {
    width: 44px; height: 44px;
    background: var(--green-dim);
    border: 1.5px solid rgba(43,204,139,0.4);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .logo-icon svg { color: var(--green); }

  .logo-text {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: 1.5px;
    color: var(--text);
  }

  .logo-text span { color: var(--green); }

  .tagline {
    text-align: center;
    font-size: 12.5px;
    color: var(--muted);
    margin-bottom: 32px;
    letter-spacing: 0.3px;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin-bottom: 28px;
  }

  .form-group { margin-bottom: 18px; }

  .form-label {
    display: block;
    font-size: 11.5px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 7px;
  }

  .form-input {
    width: 100%;
    background: var(--input-bg);
    border: 1.5px solid var(--border);
    border-radius: 7px;
    padding: 11px 14px;
    font-size: 14px;
    color: var(--text);
    font-family: var(--font);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .form-input:focus {
    border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(43,204,139,0.12);
  }
  .form-input::placeholder { color: #565970; }

  .btn-login {
    width: 100%;
    padding: 12px;
    background: var(--green);
    color: #111;
    font-size: 14px;
    font-weight: 700;
    border: none;
    border-radius: 7px;
    cursor: pointer;
    letter-spacing: 0.4px;
    transition: background 0.15s, box-shadow 0.15s;
    margin-top: 6px;
    font-family: var(--font);
  }
  .btn-login:hover { background: #25b87d; box-shadow: 0 4px 16px rgba(43,204,139,0.3); }
  .btn-login:active { background: #1fa06b; }
  .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

  .btn-login .spinner {
    display: none;
    width: 16px; height: 16px;
    border: 2px solid rgba(0,0,0,0.2);
    border-top-color: #111;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto;
  }
  .btn-login.loading .btn-text { display: none; }
  .btn-login.loading .spinner { display: block; }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-banner {
    display: none;
    background: rgba(255,71,87,0.1);
    border: 1px solid rgba(255,71,87,0.35);
    border-radius: 7px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--red);
    margin-top: 14px;
    text-align: center;
  }
  .error-banner.visible { display: block; }

  .footer-text {
    text-align: center;
    font-size: 12px;
    color: #565970;
    margin-top: 24px;
    line-height: 1.6;
  }

  .status-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-top: 20px;
    font-size: 11px;
    color: #565970;
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="logo">
      <div class="logo-icon" style="background:transparent;border:none;box-shadow:none">
        <img src="https://diaas.in/assets/images/Diaas_Logo.png" alt="DIAAS" style="height:40px;width:auto;object-fit:contain">
      </div>
      <div class="logo-text">DIAAS<span>-SEC</span></div>
    </div>
    <div class="tagline">Security Operations Training Platform</div>
    <div class="divider"></div>

    <form id="login-form" autocomplete="off">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input class="form-input" type="text" id="username" name="username"
               placeholder="Enter your username" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" name="password"
               placeholder="Enter your password" autocomplete="current-password" required>
      </div>
      <button class="btn-login" type="submit" id="login-btn">
        <span class="btn-text">Sign In</span>
        <div class="spinner"></div>
      </button>
      <div class="error-banner" id="error-banner"></div>
    </form>
  </div>

  <div class="status-bar">
    <div class="status-dot"></div>
    Platform Online
  </div>

  <div class="footer-text">
    Contact your administrator for access credentials.
  </div>
</div>

<script>
  // Auto-redirect if already logged in
  (function() {
    const token = localStorage.getItem('diaas_token');
    const user  = (() => { try { return JSON.parse(localStorage.getItem('diaas_user') || 'null'); } catch { return null; } })();
    if (token && user) {
      window.location.href = user.role === 'admin' ? '/admin' : '/analyst';
    }
  })();

  const form    = document.getElementById('login-form');
  const btn     = document.getElementById('login-btn');
  const errBanner = document.getElementById('error-banner');

  function showError(msg) {
    errBanner.textContent = msg;
    errBanner.classList.add('visible');
  }
  function hideError() { errBanner.classList.remove('visible'); }

  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    hideError();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    if (!username || !password) { showError('Please enter username and password.'); return; }

    btn.classList.add('loading');
    btn.disabled = true;

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (!res.ok) { showError(data.error || 'Login failed. Check your credentials.'); return; }
      localStorage.setItem('diaas_token', data.token);
      localStorage.setItem('diaas_user',  JSON.stringify(data.user));
      window.location.href = data.user.role === 'admin' ? '/admin' : '/analyst';
    } catch (err) {
      showError('Cannot reach the server. Make sure DIAAS-SEC is running.');
    } finally {
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
