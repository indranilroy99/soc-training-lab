<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIAAS-SEC — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:          #0A0B0D;
    --card:        #13151A;
    --card2:       #161820;
    --input-bg:    #0D0F14;
    --border:      #1E2128;
    --blue:        #3B82F6;
    --blue-dim:    rgba(59,130,246,0.12);
    --blue-muted:  rgba(59,130,246,0.08);
    --red:         #EF4444;
    --red-dim:     rgba(239,68,68,0.1);
    --orange:      #F97316;
    --orange-dim:  rgba(249,115,22,0.1);
    --text:        #F1F5F9;
    --muted:       #94A3B8;
    --dim:         #6B7280;
    --font:        'Space Grotesk', system-ui, sans-serif;
    --mono:        'JetBrains Mono', 'Fira Code', monospace;
    --green:      #22C55E;
    --green-dim:  rgba(34,197,94,0.1);
    --radius:      4px;
  }

  html, body {
    height: 100%;
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .login-wrap {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    padding: 20px;
  }

  .login-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 40px 36px;
  }

  .logo {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 6px;
  }

  .logo-text {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.3px;
    color: var(--text);
    font-family: var(--font);
  }

  .tagline {
    text-align: center;
    font-size: 12px;
    font-weight: 400;
    color: var(--dim);
    margin-bottom: 28px;
    margin-top: 6px;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin-bottom: 28px;
  }

  .form-group { margin-bottom: 18px; }

  .form-label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 7px;
  }

  .form-input {
    width: 100%;
    height: 40px;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0 14px;
    font-size: 13px;
    color: var(--text);
    font-family: var(--font);
    outline: none;
    transition: border-color 0.15s;
  }
  .form-input:focus {
    border-color: var(--blue);
  }
  .form-input::placeholder { color: #4B5563; }

  .btn-login {
    width: 100%;
    height: 40px;
    padding: 0 14px;
    background: var(--blue);
    color: #ffffff;
    font-size: 13px;
    font-weight: 500;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.15s;
    margin-top: 6px;
    font-family: var(--font);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .btn-login:hover { background: #2563EB; }
  .btn-login:active { background: #1D4ED8; }
  .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

  .btn-login .spinner {
    display: none;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: #ffffff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto;
  }
  .btn-login.loading .btn-text { display: none; }
  .btn-login.loading .spinner { display: block; }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-banner {
    display: none;
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.25);
    border-radius: 4px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--red);
    margin-top: 14px;
    text-align: center;
  }
  .error-banner.visible { display: block; }

  .footer-text {
    text-align: center;
    font-size: 11px;
    color: #4B5563;
    margin-top: 24px;
    line-height: 1.6;
  }

  .status-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-top: 20px;
    font-size: 11px;
    color: #4B5563;
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--blue);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="logo">
      <div class="logo-text">DIAAS-SEC</div>
    </div>
    <div class="tagline">Security Operations Training Platform</div>
    <div class="divider"></div>

    <form id="login-form" autocomplete="off">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input class="form-input" type="text" id="username" name="username"
               placeholder="Enter your username" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" name="password"
               placeholder="Enter your password" autocomplete="current-password" required>
      </div>
      <div class="form-group" style="display:flex;align-items:center;gap:8px;margin-top:-4px">
        <input type="checkbox" id="remember-me" style="width:16px;height:16px;cursor:pointer">
        <label for="remember-me" style="font-size:13px;color:var(--muted);cursor:pointer">
          Remember me (90 days)
        </label>
      </div>
      <button class="btn-login" type="submit" id="login-btn">
        <span class="btn-text">Sign In</span>
        <div class="spinner"></div>
      </button>
      <div class="error-banner" id="error-banner"></div>
    </form>
  </div>

  <div class="status-bar">
    <div class="status-dot"></div>
    Platform Online
  </div>

  <div class="footer-text">
    Contact your administrator for access credentials.
  </div>
</div>

<script>
  // Auto-redirect if already logged in
  (function() {
    const token = localStorage.getItem('diaas_token');
    const user  = (() => { try { return JSON.parse(localStorage.getItem('diaas_user') || 'null'); } catch { return null; } })();
    if (token && user) {
      window.location.href = user.role === 'admin' ? '/admin' : '/analyst';
    }
  })();

  const form    = document.getElementById('login-form');
  const btn     = document.getElementById('login-btn');
  const errBanner = document.getElementById('error-banner');

  function showError(msg) {
    errBanner.textContent = msg;
    errBanner.classList.add('visible');
  }
  function hideError() { errBanner.classList.remove('visible'); }

  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    hideError();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const rememberMe = document.getElementById('remember-me').checked;
    if (!username || !password) { showError('Please enter username and password.'); return; }

    btn.classList.add('loading');
    btn.disabled = true;

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password, remember_me: rememberMe })
      });
      const data = await res.json();
      if (!res.ok) { showError(data.error || 'Login failed. Check your credentials.'); return; }
      localStorage.setItem('diaas_token', data.token);
      localStorage.setItem('diaas_user',  JSON.stringify(data.user));
      
      // Save session info for display
      localStorage.setItem('diaas_session_days', data.session_days);
      
      // Store last position for resuming
      if (data.user.last_lab_slug) {
        localStorage.setItem('diaas_last_page', 'lab-view');
        localStorage.setItem('diaas_last_lab_slug', data.user.last_lab_slug);
      }
      
      window.location.href = data.user.role === 'admin' ? '/admin' : '/analyst';
    } catch (err) {
      showError('Cannot reach the server. Make sure DIAAS-SEC is running.');
    } finally {
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
